<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UNKSO — Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap');
:root{
  --bg-page:#14161c; --bg-panel:#1b1e26; --bg-card:#20232c;
  --border:#2c303a; --orange:#e35f2e; --orange-dim:#b8481f;
  --text-primary:#f2f1ee; --text-secondary:#9aa0ab; --text-muted:#6b7280;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg-page); color:var(--text-primary); font-family:'Inter',sans-serif;}

.subnav{display:flex; gap:30px; padding:16px 32px; background:var(--bg-panel); border-bottom:1px solid var(--border);}
.subnav a{color:var(--text-secondary); text-decoration:none; font-size:14px; font-weight:500; padding-bottom:4px; border-bottom:2px solid transparent;}
.subnav a.active{color:var(--orange); border-color:var(--orange);}

main{max-width:1100px; margin:0 auto; padding:32px; display:grid; grid-template-columns:1fr 380px; gap:24px;}

h1{font-family:'Poppins'; font-weight:600; font-size:22px; margin:0 0 4px;}
.sub{color:var(--text-muted); font-size:12.5px; margin-bottom:22px; letter-spacing:.03em;}

.panel{background:var(--bg-panel); border:1px solid var(--border); border-radius:14px; padding:24px;}
.preview-panel{display:flex; flex-direction:column; align-items:center;}

.jacket-mini{position:relative; width:100%; aspect-ratio:1400/950; background:url('jacket-base.jpg') center/cover no-repeat; border-radius:8px; overflow:hidden;}
.ribbon{position:absolute; border-radius:1px; border:1px solid rgba(0,0,0,.35);}
.ribbon-cover{position:absolute; background:#4f4c38; border-radius:2px;}
.name-tape{position:absolute; display:flex; align-items:center; justify-content:center; background:#c9bfa0; border:2px solid #3d3527; border-radius:2px;}
.name-tape span{font-family:'JetBrains Mono'; font-weight:600; color:#2b2717; letter-spacing:.01em; font-size:clamp(8px,1.6vw,13px); white-space:nowrap;}

.field{margin-bottom:18px;}
.field label{display:block; font-size:12px; color:var(--text-secondary); margin-bottom:6px; letter-spacing:.03em; text-transform:uppercase;}
.field input, .field select{
  width:100%; background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary);
  padding:9px 12px; border-radius:8px; font-size:14px; font-family:'Inter';
}

.ribbon-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.ribbon-check{display:flex; align-items:center; gap:8px; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:12.5px; cursor:pointer;}
.ribbon-check input{margin:0;}
.ribbon-check .swatch{width:26px; height:10px; border-radius:1.5px; border:1px solid rgba(0,0,0,.35); flex-shrink:0;}

.save-btn{
  margin-top:6px; width:100%; background:var(--orange); color:#1c1108; border:none; border-radius:8px;
  padding:12px; font-family:'Poppins'; font-weight:600; font-size:14px; cursor:pointer;
}
.save-btn:hover{background:#f06c37;}
</style>
</head>
<body>

<div class="subnav">
  <a href="index.html">Jackets</a>
  <a href="admin.html" class="active">Admin</a>
</div>

<main>
  <div>
    <h1>Edit jacket</h1>
    <div class="sub">CHANGES SYNC BACK TO THE MEMBER'S JACKET IMMEDIATELY</div>

    <div class="panel">
      <div class="field">
        <label>Member</label>
        <select id="memberSelect"></select>
      </div>
      <div class="field">
        <label>Display name</label>
        <input id="nameInput" type="text">
      </div>
      <div class="field">
        <label>Rank</label>
        <select id="rankSelect">
          <option>PVT</option><option>PFC</option><option>SPC</option><option>SGT</option>
          <option>SSG</option><option>2LT</option><option>1LT</option><option>CPT</option>
          <option>MAJ</option><option>LTC</option><option>COL</option>
        </select>
      </div>
      <div class="field">
        <label>Ribbons &amp; decorations</label>
        <div class="ribbon-grid" id="ribbonGrid"></div>
      </div>
      <button class="save-btn" id="saveBtn">Save changes</button>
    </div>
  </div>

  <div class="panel preview-panel">
    <div class="jacket-mini" id="stage"></div>
  </div>
</main>

<script>
const RIBBONS = {
  combat_readiness:  "repeating-linear-gradient(90deg,#8a3630 0 8px,#1c1e15 8px 10px,#8a3630 10px 18px)",
  national_defense:  "linear-gradient(90deg,#3a4a7a 0 30%,#e8e1cc 30% 40%,#8a3630 40% 60%,#e8e1cc 60% 70%,#3a4a7a 70% 100%)",
  marksmanship:      "repeating-linear-gradient(45deg,#4f6b34 0 6px,#c9a84c 6px 9px)",
  meritorious:       "linear-gradient(90deg,#5a3a6b 0 50%,#c9a84c 50% 100%)",
  good_conduct:      "repeating-linear-gradient(90deg,#c9a84c 0 5px,#3a4a2c 5px 10px)",
  bct_completion:    "#8f7a3a",
  valor_purple:      "#5b2a86",
  overseas_service:  "#6fa8d6",
  campaign_service:  "repeating-linear-gradient(90deg,#e35f2e 0 6px,#1c1e15 6px 8px)",
  longevity:         "repeating-linear-gradient(90deg,#2f5233 0 10px,#c9a84c 10px 12px)",
  achievement:       "#1b2a4a",
  unit_citation:     "repeating-linear-gradient(90deg,#7a1f1f 0 4px,#f2f1ee 4px 8px)"
};
const RIBBON_LABELS = {
  combat_readiness:"Combat readiness medal", national_defense:"National defense service",
  marksmanship:"Marksmanship ribbon", meritorious:"Meritorious service medal",
  good_conduct:"Good conduct ribbon", bct_completion:"BCT completion ribbon",
  valor_purple:"Valor commendation", overseas_service:"Overseas service ribbon",
  campaign_service:"Campaign service medal", longevity:"Longevity service ribbon",
  achievement:"Achievement medal", unit_citation:"Unit citation ribbon"
};

const DEFAULT_MEMBERS = [
  { id:"dentalmav", name:"LTC.DentalMav", rank:"LTC", unit:"Battalion Commander", section:"Battalion Staff", ribbons:["national_defense","valor_purple","combat_readiness","meritorious","marksmanship","achievement","overseas_service","campaign_service","unit_citation","good_conduct","longevity","bct_completion"] },
  { id:"ironsight", name:"MAJ.IronSight", rank:"MAJ", unit:"Battalion XO", section:"Battalion Staff", ribbons:["national_defense","meritorious","achievement","overseas_service","longevity"] },
  { id:"falconer", name:"1LT.Falconer", rank:"1LT", unit:"Bravo Company Commander", section:"Bravo Company", ribbons:["national_defense","combat_readiness","marksmanship","achievement"] },
  { id:"hollowpoint", name:"SGT.Hollowpoint", rank:"SGT", unit:"Bravo Company", section:"Bravo Company", ribbons:["combat_readiness","good_conduct","marksmanship"] },
  { id:"civoen", name:"2LT.Civoen", rank:"2LT", unit:"Charlie Company", section:"Charlie Company", ribbons:["national_defense","marksmanship","good_conduct","achievement","bct_completion"] },
  { id:"vincentvanghost", name:"VincentVanGhost", rank:"SPC", unit:"2nd Platoon, Charlie Co.", section:"Charlie Company", ribbons:["combat_readiness","national_defense","marksmanship"] },
  { id:"semperfi1371", name:"SemperFi1371", rank:"SPC", unit:"1st Platoon, Charlie Co.", section:"Charlie Company", ribbons:["combat_readiness","meritorious"] },
  { id:"tekk", name:"PFC.Tekk", rank:"PFC", unit:"Delta Company", section:"Delta Company", ribbons:["national_defense","bct_completion"] },
  { id:"bluebunny", name:"SPC.BlueBunny", rank:"SPC", unit:"Delta Company", section:"Delta Company", ribbons:["combat_readiness","marksmanship","good_conduct"] }
];

let MEMBERS = [];

async function loadMembers(){
  try{
    if(window.storage){
      const result = await window.storage.get('unkso-members', true);
      if(result && result.value) return JSON.parse(result.value);
    }
  }catch(err){ console.log('No saved roster yet, using defaults', err); }
  try{
    if(window.storage){
      await window.storage.set('unkso-members', JSON.stringify(DEFAULT_MEMBERS), true);
    }
  }catch(err){ console.log('Could not seed storage', err); }
  return DEFAULT_MEMBERS;
}

async function saveMembers(){
  try{
    if(window.storage){
      const result = await window.storage.set('unkso-members', JSON.stringify(MEMBERS), true);
      return !!result;
    }
  }catch(err){ console.log('Save failed', err); return false; }
  return false;
}

function chunk(arr,n){ const out=[]; for(let i=0;i<arr.length;i+=n) out.push(arr.slice(i,i+n)); return out; }

function ribbonHTML(ribbons){
  const rows = chunk(ribbons,4);
  const cellW=4.6, cellH=2.9, colGap=0.35, rowGap=0.35;
  const rackLeft=62.5, rackBottom=58.5;
  const R = rows.length;
  let html='';
  rows.forEach((row,ri)=>{
    const rowsFromBottom = R-1-ri;
    const top = rackBottom - (rowsFromBottom+1)*(cellH+rowGap);
    row.forEach((key,ci)=>{
      const left = rackLeft + ci*(cellW+colGap);
      html += `<div class="ribbon" style="left:${left}%; top:${top}%; width:${cellW}%; height:${cellH}%; background:${RIBBONS[key]};"></div>`;
    });
  });
  return html;
}

function renderJacket(stage, member){
  stage.innerHTML = `
    <div class="ribbon-cover" style="left:62%; top:47.5%; width:21%; height:12%;"></div>
    <div class="name-tape" style="left:24%; top:58.5%; width:16%; height:6.2%;"><span>${member.name.toUpperCase()}</span></div>
    ${ribbonHTML(member.ribbons)}
  `;
}

const memberSelect = document.getElementById('memberSelect');
const nameInput = document.getElementById('nameInput');
const rankSelect = document.getElementById('rankSelect');
const ribbonGrid = document.getElementById('ribbonGrid');
const stage = document.getElementById('stage');

Object.keys(RIBBONS).forEach(key=>{
  const wrap = document.createElement('label');
  wrap.className = 'ribbon-check';
  wrap.innerHTML = `<input type="checkbox" data-key="${key}"><span class="swatch" style="background:${RIBBONS[key]}"></span>${RIBBON_LABELS[key]}`;
  ribbonGrid.appendChild(wrap);
});

function loadMember(id){
  const m = MEMBERS.find(x=>x.id===id);
  nameInput.value = m.name;
  rankSelect.value = m.rank;
  ribbonGrid.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.checked = m.ribbons.includes(cb.dataset.key);
  });
  renderJacket(stage, m);
}

function currentEdits(){
  const m = MEMBERS.find(x=>x.id===memberSelect.value);
  const ribbons = Array.from(ribbonGrid.querySelectorAll('input[type=checkbox]:checked')).map(cb=>cb.dataset.key);
  return { id:m.id, name:nameInput.value, rank:rankSelect.value, unit:m.unit, section:m.section, ribbons };
}

function refreshPreview(){ renderJacket(stage, currentEdits()); }

memberSelect.addEventListener('change', e=>loadMember(e.target.value));
nameInput.addEventListener('input', refreshPreview);
rankSelect.addEventListener('change', refreshPreview);
ribbonGrid.addEventListener('change', refreshPreview);

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const edits = currentEdits();
  MEMBERS = MEMBERS.map(m => m.id===edits.id ? edits : m);
  const btn = document.getElementById('saveBtn');
  const original = btn.textContent;
  btn.textContent = 'Saving…';
  const ok = await saveMembers();
  btn.textContent = ok ? 'Saved' : 'Save failed — retry';
  setTimeout(()=>{ btn.textContent = original; }, 1400);
});

async function init(){
  MEMBERS = await loadMembers();
  MEMBERS.forEach(m=>{
    const opt = document.createElement('option');
    opt.value = m.id; opt.textContent = m.name;
    memberSelect.appendChild(opt);
  });
  loadMember(MEMBERS[0].id);
}

init();
</script>

</body>
</html>
