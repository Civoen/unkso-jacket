<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UNKSO — Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap');
:root{
  --bg-page:#14161c; --bg-panel:#1b1e26; --bg-card:#20232c;
  --border:#2c303a; --orange:#e35f2e; --orange-dim:#b8481f;
  --text-primary:#f2f1ee; --text-secondary:#9aa0ab; --text-muted:#6b7280;
  --red:#c0392b;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg-page); color:var(--text-primary); font-family:'Inter',sans-serif;}

.subnav{display:flex; align-items:center; gap:30px; padding:16px 32px; background:var(--bg-panel); border-bottom:1px solid var(--border);}
.subnav a{color:var(--text-secondary); text-decoration:none; font-size:14px; font-weight:500; padding-bottom:4px; border-bottom:2px solid transparent;}
.subnav a.active{color:var(--orange); border-color:var(--orange);}
.subnav a.nav-cta{
  margin-left:auto; color:#1c1108; background:var(--orange); padding:7px 18px; border-radius:7px;
  font-weight:700; border-bottom:none; box-shadow:0 1px 0 rgba(0,0,0,.2);
}
.subnav a.nav-cta:hover{background:#f06c37;}
.subnav a.nav-cta.active{background:#f06c37; box-shadow:0 0 0 2px rgba(227,95,46,.4);}

main{max-width:1100px; margin:0 auto; padding:32px; display:grid; grid-template-columns:1fr 380px; gap:24px;}

h1{font-family:'Poppins'; font-weight:600; font-size:22px; margin:0 0 4px;}
.sub{color:var(--text-muted); font-size:12.5px; margin-bottom:22px; letter-spacing:.03em;}

.panel{background:var(--bg-panel); border:1px solid var(--border); border-radius:14px; padding:24px;}
.preview-panel{display:flex; flex-direction:column; align-items:center;}

.jacket-mini{position:relative; width:100%; aspect-ratio:5747/3902; background:url('jacket-template.svg') center/cover no-repeat; border-radius:8px; overflow:hidden;}
.ribbon{position:absolute; border-radius:1px; border:1px solid rgba(0,0,0,.35); background-size:cover; background-position:center; background-color:#2a2d22;}
.badge{position:absolute; border:1px solid rgba(0,0,0,.4); box-shadow:0 1px 1px rgba(0,0,0,.3);}
.insignia{position:absolute; background-size:cover; background-position:center; background-repeat:no-repeat;}
.name-tape{position:absolute; display:flex; align-items:center; justify-content:center; background:#c9bfa0; border:2px solid #3d3527; border-radius:2px; padding:0 4%; overflow:hidden;}
.name-tape span{font-family:'JetBrains Mono'; font-weight:600; color:#2b2717; letter-spacing:.01em; white-space:nowrap; display:inline-block;}

.member-row{display:flex; gap:10px; margin-bottom:18px;}
.member-row select{flex:1;}
.icon-btn{
  flex-shrink:0; width:40px; background:var(--bg-card); border:1px solid var(--border); color:var(--text-secondary);
  border-radius:8px; font-size:16px; cursor:pointer; font-family:'Inter';
}
.icon-btn:hover{border-color:var(--orange-dim); color:var(--orange);}
.icon-btn.danger:hover{border-color:var(--red); color:var(--red);}

.field{margin-bottom:18px;}
.field label{display:block; font-size:12px; color:var(--text-secondary); margin-bottom:6px; letter-spacing:.03em; text-transform:uppercase;}
.field input, .field select{
  width:100%; background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary);
  padding:9px 12px; border-radius:8px; font-size:14px; font-family:'Inter';
}
.field-row{display:flex; gap:12px;}
.field-row .field{flex:1;}

.ribbon-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.ribbon-check{display:flex; align-items:center; gap:8px; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:12.5px; cursor:pointer;}
.ribbon-check input{margin:0;}
.ribbon-check .swatch{width:26px; height:10px; border-radius:1.5px; border:1px solid rgba(0,0,0,.35); flex-shrink:0; background-size:cover; background-position:center; background-color:#2a2d22;}

.badge-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.badge-check{display:flex; align-items:center; gap:8px; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:12.5px; cursor:pointer;}
.badge-check input{margin:0;}
.badge-check .swatch{width:16px; height:16px; border:1px solid rgba(0,0,0,.35); flex-shrink:0;}

.save-btn{
  margin-top:6px; width:100%; background:var(--orange); color:#1c1108; border:none; border-radius:8px;
  padding:12px; font-family:'Poppins'; font-weight:600; font-size:14px; cursor:pointer;
}
.save-btn:hover{background:#f06c37;}
</style>
</head>
<body>

<div class="subnav">
  <a href="index.html">Jackets</a>
  <a href="ranks.html">Ranks</a>
  <a href="ribbons.html">Ribbons</a>
  <a href="badges.html">Badges</a>
  <a href="admin.html" class="nav-cta active">Admin</a>
</div>

<main>
  <div>
    <h1>Edit jacket</h1>
    <div class="sub">CHANGES SYNC BACK TO THE MEMBER'S JACKET IMMEDIATELY</div>

    <div class="panel">
      <div class="field">
        <label>Member</label>
        <div class="member-row">
          <select id="memberSelect"></select>
          <button class="icon-btn" id="newBtn" title="New member">+</button>
          <button class="icon-btn danger" id="removeBtn" title="Remove member">&times;</button>
        </div>
      </div>
      <div class="field">
        <label>Display name</label>
        <input id="nameInput" type="text">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Rank</label>
          <select id="rankSelect"></select>
        </div>
        <div class="field">
          <label>Unit</label>
          <select id="unitSelect"></select>
        </div>
        <div class="field">
          <label>Position</label>
          <select id="positionSelect"></select>
        </div>
      </div>
      <div class="field">
        <label>Ribbons &amp; decorations</label>
        <div class="ribbon-grid" id="ribbonGrid"></div>
      </div>
      <div class="field">
        <label>Badges</label>
        <div class="badge-grid" id="badgeGrid"></div>
      </div>
      <button class="save-btn" id="saveBtn">Save changes</button>
    </div>
  </div>

  <div class="panel preview-panel">
    <div class="jacket-mini" id="stage"></div>
  </div>
</main>

<script>
const UNIT_OPTIONS = ["Battalion","Bravo","Charlie","Delta"];
const POSITION_OPTIONS = ["Member","SL","PS","1SG","XO","CO"];
const DEFAULT_RANKS = ["LTC","MAJ","2LT","1LT","CSM","SFC","SSG","SGT","CPL","SPC","PFC","PV2","PVT","RT"].map(name=>({name, insignia:null}));

const DEFAULT_RIBBONS = [
  { key:"combat_readiness",  label:"Combat Readiness Medal",     image:null },
  { key:"national_defense",  label:"National Defense Service",   image:null },
  { key:"marksmanship",      label:"Marksmanship Ribbon",        image:null },
  { key:"meritorious",       label:"Meritorious Service Medal",  image:null },
  { key:"good_conduct",      label:"Good Conduct Ribbon",        image:null },
  { key:"bct_completion",    label:"BCT Completion Ribbon",      image:null },
  { key:"valor_purple",      label:"Valor Commendation",         image:null },
  { key:"overseas_service",  label:"Overseas Service Ribbon",    image:null },
  { key:"campaign_service",  label:"Campaign Service Medal",     image:null },
  { key:"longevity",         label:"Longevity Service Ribbon",   image:null },
  { key:"achievement",       label:"Achievement Medal",          image:null },
  { key:"unit_citation",     label:"Unit Citation Ribbon",       image:null }
];

const DEFAULT_BADGES = [
  { key:"expert_marksman", label:"Expert Marksmanship Badge", shape:"circle",  color:"#c9a84c" },
  { key:"airborne_wings",  label:"Airborne Wings",             shape:"diamond", color:"#8a9bb0" },
  { key:"combat_infantry", label:"Combat Infantryman Badge",   shape:"square",  color:"#3a4a2c" },
  { key:"drill_sergeant",  label:"Drill Sergeant Badge",       shape:"circle",  color:"#7a1f1f" }
];

const DEFAULT_MEMBERS = [
  { id:"dentalmav", name:"LTC.DentalMav", rank:"LTC", unit:"Battalion", position:"CO", ribbons:["national_defense","valor_purple","combat_readiness","meritorious","marksmanship","achievement","overseas_service","campaign_service","unit_citation","good_conduct","longevity","bct_completion"], badges:["combat_infantry","expert_marksman"] },
  { id:"ironsight", name:"MAJ.IronSight", rank:"MAJ", unit:"Battalion", position:"XO", ribbons:["national_defense","meritorious","achievement","overseas_service","longevity"], badges:["drill_sergeant"] },
  { id:"falconer", name:"1LT.Falconer", rank:"1LT", unit:"Bravo", position:"CO", ribbons:["national_defense","combat_readiness","marksmanship","achievement"], badges:["airborne_wings"] },
  { id:"hollowpoint", name:"SGT.Hollowpoint", rank:"SGT", unit:"Bravo", position:"SL", ribbons:["combat_readiness","good_conduct","marksmanship"], badges:[] },
  { id:"civoen", name:"2LT.Civoen", rank:"2LT", unit:"Charlie", position:"CO", ribbons:["national_defense","marksmanship","good_conduct","achievement","bct_completion"], badges:[] },
  { id:"vincentvanghost", name:"VincentVanGhost", rank:"SPC", unit:"Charlie", position:"Member", ribbons:["combat_readiness","national_defense","marksmanship"], badges:[] },
  { id:"semperfi1371", name:"SemperFi1371", rank:"SPC", unit:"Charlie", position:"Member", ribbons:["combat_readiness","meritorious"], badges:[] },
  { id:"tekk", name:"PFC.Tekk", rank:"PFC", unit:"Delta", position:"Member", ribbons:["national_defense","bct_completion"], badges:[] },
  { id:"bluebunny", name:"SPC.BlueBunny", rank:"SPC", unit:"Delta", position:"Member", ribbons:["combat_readiness","marksmanship","good_conduct"], badges:[] }
];

// Set this to your deployed Worker URL (no trailing slash), e.g. 'https://unkso-api.yoursubdomain.workers.dev'
const API_BASE = 'https://unkso-api.adambramfitt.workers.dev';

async function loadJSON(key, defaults){
  try{
    const res = await fetch(`${API_BASE}/api/${key}`);
    if(res.ok){
      const data = await res.json();
      if(data !== null) return data;
    }
  }catch(err){ console.log('Could not load '+key+' from API, using defaults', err); }
  try{
    await fetch(`${API_BASE}/api/${key}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(defaults)
    });
  }catch(err){ console.log('Could not seed '+key, err); }
  return defaults;
}

async function saveJSON(key, value){
  try{
    const res = await fetch(`${API_BASE}/api/${key}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(value)
    });
    return res.ok;
  }catch(err){ console.log('Save failed for '+key, err); return false; }
}

function ribbonBackground(r){
  return r.image ? `url(${r.image})` : `repeating-linear-gradient(45deg,#33362a 0 6px,#25271e 6px 12px)`;
}

function chunk(arr,n){ const out=[]; for(let i=0;i<arr.length;i+=n) out.push(arr.slice(i,i+n)); return out; }

function distributeBottomHeavy(items, maxPerRow){
  const n = items.length;
  if(n === 0) return [];
  const numRows = Math.ceil(n / maxPerRow);
  const base = Math.floor(n / numRows);
  let rem = n - base*numRows;
  const sizes = new Array(numRows).fill(base);
  for(let i = numRows-1; i >= 0 && rem > 0; i--, rem--){
    sizes[i] += 1;
  }
  const rows = [];
  let idx = 0;
  for(const size of sizes){
    rows.push(items.slice(idx, idx+size));
    idx += size;
  }
  return rows;
}

function ribbonHTML(ribbonKeys, ribbonMap){
  const rows = distributeBottomHeavy(ribbonKeys, 4);
  const cellW=4.6, cellH=2.9, colGap=0.35, rowGap=0.35;
  const centerX=69.2, rackBottom=54;
  const R = rows.length;
  let html='';
  rows.forEach((row,ri)=>{
    const rowsFromBottom = R-1-ri;
    const top = rackBottom - (rowsFromBottom+1)*(cellH+rowGap);
    const totalW = row.length*cellW + (row.length-1)*colGap;
    const left0 = centerX - totalW/2;
    row.forEach((key,ci)=>{
      const left = left0 + ci*(cellW+colGap);
      const def = ribbonMap[key];
      if(!def) return;
      html += `<div class="ribbon" style="left:${left}%; top:${top}%; width:${cellW}%; height:${cellH}%; background-image:${ribbonBackground(def)};"></div>`;
    });
  });
  return html;
}

function badgeHTML(badgeKeys, badgeMap){
  const cellSize=2.2, gap=0.3, rowBottom=61.5, centerX=67.5;
  const rows = chunk(badgeKeys,5);
  const R = rows.length;
  let html='';
  rows.forEach((row,ri)=>{
    const rowsFromBottom = R-1-ri;
    const top = rowBottom - (rowsFromBottom+1)*(cellSize+gap);
    const totalW = row.length*cellSize + (row.length-1)*gap;
    const left0 = centerX - totalW/2;
    row.forEach((key,ci)=>{
      const def = badgeMap[key];
      if(!def) return;
      const left = left0 + ci*(cellSize+gap);
      const radius = def.shape === 'circle' ? '50%' : '0';
      const clip = def.shape === 'diamond' ? 'clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);' : '';
      html += `<div class="badge" style="left:${left}%; top:${top}%; width:${cellSize}%; height:${cellSize}%; background:${def.color}; border-radius:${radius}; ${clip}"></div>`;
    });
  });
  return html;
}

function insigniaHTML(rankName, rankMap){
  const def = rankMap[rankName];
  if(!def || !def.insignia) return '';
  const w=7, h=4.2;
  const leftCenterX=31, leftCenterY=12.2;
  const rightCenterX=69, rightCenterY=12.2;
  const left = `
    <div class="insignia" style="left:${leftCenterX-w/2}%; top:${leftCenterY-h/2}%; width:${w}%; height:${h}%; background-image:url(${def.insignia}); transform:rotate(-22deg) skewX(-10deg);"></div>`;
  const right = `
    <div class="insignia" style="left:${rightCenterX-w/2}%; top:${rightCenterY-h/2}%; width:${w}%; height:${h}%; background-image:url(${def.insignia}); transform:rotate(22deg) skewX(10deg);"></div>`;
  return left + right;
}

function fitNameTape(tapeEl){
  const span = tapeEl.querySelector('span');
  if(!span) return;
  const maxWidth = tapeEl.clientWidth * 0.92;
  let size = tapeEl.clientHeight * 0.6;
  span.style.fontSize = size + 'px';
  let guard = 0;
  while(span.scrollWidth > maxWidth && size > 3 && guard < 120){
    size -= 0.4;
    span.style.fontSize = size + 'px';
    guard++;
  }
}

let MEMBERS = [];
let RANKS = [];
let RIBBONS = [];
let BADGES = [];

function ribbonMapOf(){ const m={}; RIBBONS.forEach(r=>m[r.key]=r); return m; }
function badgeMapOf(){ const m={}; BADGES.forEach(b=>m[b.key]=b); return m; }
function rankMapOf(){ const m={}; RANKS.forEach(r=>m[r.name]=r); return m; }
function rankIndex(name){ return RANKS.findIndex(r=>r.name===name); }
function newId(){ return 'm_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function renderJacket(stage, member){
  const ribbonMap = ribbonMapOf();
  const badgeMap = badgeMapOf();
  const rankMap = rankMapOf();
  stage.innerHTML = `
    ${insigniaHTML(member.rank, rankMap)}
    <div class="name-tape" style="left:24%; top:58.5%; width:16%; height:6.2%;"><span>${member.name.toUpperCase()}</span></div>
    ${ribbonHTML(member.ribbons, ribbonMap)}
    ${badgeHTML(member.badges||[], badgeMap)}
  `;
  const tape = stage.querySelector('.name-tape');
  if(tape) fitNameTape(tape);
}

const memberSelect = document.getElementById('memberSelect');
const nameInput = document.getElementById('nameInput');
const rankSelect = document.getElementById('rankSelect');
const unitSelect = document.getElementById('unitSelect');
const positionSelect = document.getElementById('positionSelect');
const ribbonGrid = document.getElementById('ribbonGrid');
const badgeGrid = document.getElementById('badgeGrid');
const stage = document.getElementById('stage');

function populateStaticSelects(){
  unitSelect.innerHTML = UNIT_OPTIONS.map(u=>`<option>${u}</option>`).join('');
  positionSelect.innerHTML = POSITION_OPTIONS.map(p=>`<option>${p}</option>`).join('');
}

function populateRankSelect(){
  rankSelect.innerHTML = RANKS.map(r=>`<option>${r.name}</option>`).join('');
}

function populateRibbonGrid(){
  ribbonGrid.innerHTML = '';
  RIBBONS.forEach(r=>{
    const wrap = document.createElement('label');
    wrap.className = 'ribbon-check';
    wrap.innerHTML = `<input type="checkbox" data-key="${r.key}"><span class="swatch" style="${r.image ? `background-image:url(${r.image})` : ''}"></span>${r.label}`;
    ribbonGrid.appendChild(wrap);
  });
}

function populateBadgeGrid(){
  badgeGrid.innerHTML = '';
  BADGES.forEach(b=>{
    const wrap = document.createElement('label');
    wrap.className = 'badge-check';
    const radius = b.shape === 'circle' ? '50%' : (b.shape === 'diamond' ? '0' : '3px');
    const clip = b.shape === 'diamond' ? 'clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);' : '';
    wrap.innerHTML = `<input type="checkbox" data-key="${b.key}"><span class="swatch" style="background:${b.color}; border-radius:${radius}; ${clip}"></span>${b.label}`;
    badgeGrid.appendChild(wrap);
  });
}

function sortMembersBySeniority(){
  MEMBERS.sort((a,b)=>{
    const ai = rankIndex(a.rank); const bi = rankIndex(b.rank);
    const aRank = ai === -1 ? RANKS.length : ai;
    const bRank = bi === -1 ? RANKS.length : bi;
    if(aRank !== bRank) return aRank - bRank;
    return a.name.localeCompare(b.name);
  });
}

function populateMemberSelect(selectedId){
  memberSelect.innerHTML = MEMBERS.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
  if(selectedId) memberSelect.value = selectedId;
}

function loadMember(id){
  const m = MEMBERS.find(x=>x.id===id);
  if(!m) return;
  nameInput.value = m.name;
  rankSelect.value = m.rank;
  unitSelect.value = m.unit;
  positionSelect.value = m.position;
  ribbonGrid.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.checked = m.ribbons.includes(cb.dataset.key);
  });
  badgeGrid.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.checked = (m.badges||[]).includes(cb.dataset.key);
  });
  renderJacket(stage, m);
}

function currentEdits(){
  const m = MEMBERS.find(x=>x.id===memberSelect.value);
  const ribbons = Array.from(ribbonGrid.querySelectorAll('input[type=checkbox]:checked')).map(cb=>cb.dataset.key);
  const badges = Array.from(badgeGrid.querySelectorAll('input[type=checkbox]:checked')).map(cb=>cb.dataset.key);
  return { id:m.id, name:nameInput.value, rank:rankSelect.value, unit:unitSelect.value, position:positionSelect.value, ribbons, badges };
}

function refreshPreview(){ renderJacket(stage, currentEdits()); }

memberSelect.addEventListener('change', e=>loadMember(e.target.value));
nameInput.addEventListener('input', refreshPreview);
rankSelect.addEventListener('change', refreshPreview);
unitSelect.addEventListener('change', refreshPreview);
positionSelect.addEventListener('change', refreshPreview);
ribbonGrid.addEventListener('change', refreshPreview);
badgeGrid.addEventListener('change', refreshPreview);

document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const edits = currentEdits();
  MEMBERS = MEMBERS.map(m => m.id===edits.id ? edits : m);
  const btn = document.getElementById('saveBtn');
  const original = btn.textContent;
  btn.textContent = 'Saving…';
  const ok = await saveJSON('members', MEMBERS);
  sortMembersBySeniority();
  populateMemberSelect(edits.id);
  btn.textContent = ok ? 'Saved' : 'Save failed — retry';
  setTimeout(()=>{ btn.textContent = original; }, 1400);
});

document.getElementById('newBtn').addEventListener('click', async ()=>{
  const member = { id:newId(), name:"New Member", rank: (RANKS[0] && RANKS[0].name) || "PVT", unit: UNIT_OPTIONS[0], position:"Member", ribbons:[], badges:[] };
  MEMBERS.push(member);
  await saveJSON('members', MEMBERS);
  sortMembersBySeniority();
  populateMemberSelect(member.id);
  loadMember(member.id);
});

document.getElementById('removeBtn').addEventListener('click', async ()=>{
  if(MEMBERS.length <= 1){ alert("Can't remove the last member."); return; }
  if(!confirm('Remove this member from the roster?')) return;
  const id = memberSelect.value;
  MEMBERS = MEMBERS.filter(m=>m.id!==id);
  await saveJSON('members', MEMBERS);
  sortMembersBySeniority();
  populateMemberSelect(MEMBERS[0].id);
  loadMember(MEMBERS[0].id);
});

window.addEventListener('resize', () => {
  const tape = stage.querySelector('.name-tape');
  if(tape) fitNameTape(tape);
});

async function init(){
  MEMBERS = await loadJSON('members', DEFAULT_MEMBERS);
  RANKS = await loadJSON('ranks', DEFAULT_RANKS);
  RIBBONS = await loadJSON('ribbons', DEFAULT_RIBBONS);
  BADGES = await loadJSON('badges', DEFAULT_BADGES);
  sortMembersBySeniority();
  populateStaticSelects();
  populateRankSelect();
  populateRibbonGrid();
  populateBadgeGrid();

  const requestedId = new URLSearchParams(window.location.search).get('member');
  const initialId = (requestedId && MEMBERS.some(m=>m.id===requestedId)) ? requestedId : MEMBERS[0].id;

  populateMemberSelect(initialId);
  loadMember(initialId);
}

init();
</script>

</body>
</html>
