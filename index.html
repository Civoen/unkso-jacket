<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UNKSO — Jackets</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap');
:root{
  --bg-page:#14161c; --bg-panel:#1b1e26; --bg-card:#20232c;
  --border:#2c303a; --orange:#e35f2e; --orange-dim:#b8481f;
  --text-primary:#f2f1ee; --text-secondary:#9aa0ab; --text-muted:#6b7280;
  --red:#c0392b;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg-page); color:var(--text-primary); font-family:'Inter',sans-serif;}

.subnav{display:flex; align-items:center; gap:30px; padding:16px 32px; background:var(--bg-panel); border-bottom:1px solid var(--border);}
.subnav a{color:var(--text-secondary); text-decoration:none; font-size:14px; font-weight:500; padding-bottom:4px; border-bottom:2px solid transparent;}
.subnav a.active{color:var(--orange); border-color:var(--orange);}
.subnav a.nav-cta{
  margin-left:auto; color:#1c1108; background:var(--orange); padding:7px 18px; border-radius:7px;
  font-weight:700; border-bottom:none; box-shadow:0 1px 0 rgba(0,0,0,.2);
}
.subnav a.nav-cta:hover{background:#f06c37;}
.subnav a.nav-cta.active{background:#f06c37; box-shadow:0 0 0 2px rgba(227,95,46,.4);}

main{max-width:1200px; margin:0 auto; padding:32px;}

.company{margin-bottom:40px;}
.company-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid var(--border);}
.company-head h2{font-family:'Poppins'; font-weight:600; font-size:19px; margin:0; color:var(--orange);}
.head-actions{display:flex; gap:8px;}
.collapse-btn{background:transparent; border:1px solid var(--border); color:var(--text-secondary); font-size:12px; font-weight:500; padding:6px 12px; border-radius:6px; cursor:pointer; font-family:'Inter';}
.collapse-btn:hover{border-color:var(--orange-dim); color:var(--orange);}
.new-btn{background:var(--bg-card); border:1px solid var(--orange-dim); color:var(--orange); font-size:12.5px; font-weight:600; padding:6px 14px; border-radius:6px; cursor:pointer; font-family:'Inter';}
.new-btn:hover{background:var(--orange-dim); color:#1c1108;}

.member-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:18px;}
.member-card{position:relative; background:var(--bg-panel); border:1px solid var(--border); border-radius:12px; padding:14px; cursor:pointer; transition:border-color .15s;}
.member-card:hover{border-color:var(--orange-dim);}

.remove-btn{
  position:absolute; top:8px; right:8px; width:22px; height:22px; border-radius:50%;
  background:rgba(20,22,28,.85); border:1px solid var(--border); color:var(--text-secondary);
  font-size:13px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
  z-index:2;
}
.remove-btn:hover{background:var(--red); color:#fff; border-color:var(--red);}

.zoom-btn{
  position:absolute; top:36px; right:8px; width:22px; height:22px; border-radius:50%;
  background:rgba(20,22,28,.85); border:1px solid var(--border); color:var(--text-secondary);
  font-size:11px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
  z-index:2;
}
.zoom-btn:hover{background:var(--orange); color:#1c1108; border-color:var(--orange);}

.insignia{position:absolute; background-size:cover; background-position:center; background-repeat:no-repeat; transform-origin:50% 50%;}

.zoom-overlay{
  display:none; position:fixed; inset:0; background:rgba(10,11,14,.85); z-index:50;
  align-items:center; justify-content:center; padding:40px;
}
.zoom-overlay.open{display:flex;}
.zoom-box{background:var(--bg-panel); border:1px solid var(--border); border-radius:14px; padding:28px; max-width:640px; width:100%;}
.zoom-box .jacket-mini{width:100%;}
.zoom-caption{margin-top:16px; text-align:center;}
.zoom-caption .zname{font-family:'Poppins'; font-weight:600; font-size:18px;}
.zoom-caption .zrank{color:var(--text-secondary); font-size:13px; margin-top:2px;}
.zoom-close{
  display:block; margin:18px auto 0; background:var(--bg-card); border:1px solid var(--border); color:var(--text-secondary);
  padding:8px 20px; border-radius:8px; cursor:pointer; font-family:'Inter'; font-size:13px;
}
.zoom-close:hover{border-color:var(--orange-dim); color:var(--orange);}

.jacket-mini{position:relative; width:100%; aspect-ratio:5747/3902; background:url('jacket-template.svg') center/cover no-repeat; border-radius:8px; overflow:hidden;}
.ribbon{position:absolute; border-radius:1px; border:1px solid rgba(0,0,0,.35); background-size:cover; background-position:center; background-color:#2a2d22;}
.badge{position:absolute; border:1px solid rgba(0,0,0,.4); box-shadow:0 1px 1px rgba(0,0,0,.3);}
.name-tape{position:absolute; display:flex; align-items:center; justify-content:center; background:#c9bfa0; border:2px solid #3d3527; border-radius:2px; padding:0 4%; overflow:hidden;}
.name-tape span{font-family:'JetBrains Mono'; font-weight:600; color:#2b2717; letter-spacing:.01em; white-space:nowrap; display:inline-block;}

.mcaption{margin-top:10px; text-align:center;}
.mcaption .mname{font-family:'Poppins'; font-weight:600; font-size:14.5px;}
.mcaption .mrank{color:var(--text-secondary); font-size:12px; margin-top:2px;}

.loading{color:var(--text-muted); padding:40px; text-align:center; font-size:13px;}
.empty-note{color:var(--text-muted); font-size:12.5px; padding:10px 2px;}

.search-row{margin-bottom:26px;}
.search-row input{
  width:100%; background:var(--bg-panel); border:1px solid var(--border); color:var(--text-primary);
  padding:11px 16px; border-radius:10px; font-size:14px; font-family:'Inter';
}
</style>
</head>
<body>

<div class="subnav">
  <a href="index.html" class="active">Jackets</a>
  <a href="ranks.html">Ranks</a>
  <a href="ribbons.html">Ribbons</a>
  <a href="badges.html">Badges</a>
  <a href="admin.html" class="nav-cta">Admin</a>
</div>

<main>
  <div class="search-row"><input id="searchInput" type="text" placeholder="Search by name, rank, position, or unit…"></div>
  <div id="main">
    <div class="loading">Loading roster…</div>
  </div>
</main>

<div class="zoom-overlay" id="zoomOverlay">
  <div class="zoom-box">
    <div class="jacket-mini" id="zoomStage"></div>
    <div class="zoom-caption">
      <div class="zname" id="zoomName"></div>
      <div class="zrank" id="zoomRank"></div>
    </div>
    <button class="zoom-close" id="zoomClose">Close</button>
  </div>
</div>

<script>
const UNIT_OPTIONS = ["Battalion","Bravo","Charlie","Delta"];
const POSITION_SENIORITY = ["CO","XO","1SG","PS","SL","Member"];
const DEFAULT_RANKS = ["LTC","MAJ","2LT","1LT","CSM","SFC","SSG","SGT","CPL","SPC","PFC","PV2","PVT","RT"].map(name=>({name, insignia:null}));

const DEFAULT_RIBBONS = [
  { key:"combat_readiness",  label:"Combat Readiness Medal",     image:null },
  { key:"national_defense",  label:"National Defense Service",   image:null },
  { key:"marksmanship",      label:"Marksmanship Ribbon",        image:null },
  { key:"meritorious",       label:"Meritorious Service Medal",  image:null },
  { key:"good_conduct",      label:"Good Conduct Ribbon",        image:null },
  { key:"bct_completion",    label:"BCT Completion Ribbon",      image:null },
  { key:"valor_purple",      label:"Valor Commendation",         image:null },
  { key:"overseas_service",  label:"Overseas Service Ribbon",    image:null },
  { key:"campaign_service",  label:"Campaign Service Medal",     image:null },
  { key:"longevity",         label:"Longevity Service Ribbon",   image:null },
  { key:"achievement",       label:"Achievement Medal",          image:null },
  { key:"unit_citation",     label:"Unit Citation Ribbon",       image:null }
];

const DEFAULT_MEMBERS = [
  { id:"dentalmav", name:"LTC.DentalMav", rank:"LTC", unit:"Battalion", position:"CO", ribbons:["national_defense","valor_purple","combat_readiness","meritorious","marksmanship","achievement","overseas_service","campaign_service","unit_citation","good_conduct","longevity","bct_completion"], badges:["combat_infantry","expert_marksman"] },
  { id:"ironsight", name:"MAJ.IronSight", rank:"MAJ", unit:"Battalion", position:"XO", ribbons:["national_defense","meritorious","achievement","overseas_service","longevity"], badges:["drill_sergeant"] },
  { id:"falconer", name:"1LT.Falconer", rank:"1LT", unit:"Bravo", position:"CO", ribbons:["national_defense","combat_readiness","marksmanship","achievement"], badges:["airborne_wings"] },
  { id:"hollowpoint", name:"SGT.Hollowpoint", rank:"SGT", unit:"Bravo", position:"SL", ribbons:["combat_readiness","good_conduct","marksmanship"], badges:[] },
  { id:"civoen", name:"2LT.Civoen", rank:"2LT", unit:"Charlie", position:"CO", ribbons:["national_defense","marksmanship","good_conduct","achievement","bct_completion"], badges:[] },
  { id:"vincentvanghost", name:"VincentVanGhost", rank:"SPC", unit:"Charlie", position:"Member", ribbons:["combat_readiness","national_defense","marksmanship"], badges:[] },
  { id:"semperfi1371", name:"SemperFi1371", rank:"SPC", unit:"Charlie", position:"Member", ribbons:["combat_readiness","meritorious"], badges:[] },
  { id:"tekk", name:"PFC.Tekk", rank:"PFC", unit:"Delta", position:"Member", ribbons:["national_defense","bct_completion"], badges:[] },
  { id:"bluebunny", name:"SPC.BlueBunny", rank:"SPC", unit:"Delta", position:"Member", ribbons:["combat_readiness","marksmanship","good_conduct"], badges:[] }
];

const DEFAULT_BADGES = [
  { key:"expert_marksman", label:"Expert Marksmanship Badge", shape:"circle",  color:"#c9a84c" },
  { key:"airborne_wings",  label:"Airborne Wings",             shape:"diamond", color:"#8a9bb0" },
  { key:"combat_infantry", label:"Combat Infantryman Badge",   shape:"square",  color:"#3a4a2c" },
  { key:"drill_sergeant",  label:"Drill Sergeant Badge",       shape:"circle",  color:"#7a1f1f" }
];

// Set this to your deployed Worker URL (no trailing slash), e.g. 'https://unkso-api.yoursubdomain.workers.dev'
const API_BASE = 'https://unkso-api.adambramfitt.workers.dev';

async function loadJSON(key, defaults){
  try{
    const res = await fetch(`${API_BASE}/api/${key}`);
    if(res.ok){
      const data = await res.json();
      if(data !== null) return data;
    }
  }catch(err){ console.log('Could not load '+key+' from API, using defaults', err); }
  try{
    await fetch(`${API_BASE}/api/${key}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(defaults)
    });
  }catch(err){ console.log('Could not seed '+key, err); }
  return defaults;
}

async function saveJSON(key, value){
  try{
    const res = await fetch(`${API_BASE}/api/${key}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(value)
    });
    return res.ok;
  }catch(err){ console.log('Save failed for '+key, err); return false; }
}

function ribbonBackground(r){
  return r.image ? `url(${r.image})` : `repeating-linear-gradient(45deg,#33362a 0 6px,#25271e 6px 12px)`;
}

function chunk(arr,n){ const out=[]; for(let i=0;i<arr.length;i+=n) out.push(arr.slice(i,i+n)); return out; }

// Splits items into rows (top-to-bottom order) of at most maxPerRow, distributing
// as evenly as possible across the minimum number of rows, and always giving any
// remainder to the bottom-most row(s) first, so the rack is never top-heavy.
function distributeBottomHeavy(items, maxPerRow){
  const n = items.length;
  if(n === 0) return [];
  const numRows = Math.ceil(n / maxPerRow);
  const base = Math.floor(n / numRows);
  let rem = n - base*numRows;
  const sizes = new Array(numRows).fill(base);
  for(let i = numRows-1; i >= 0 && rem > 0; i--, rem--){
    sizes[i] += 1;
  }
  const rows = [];
  let idx = 0;
  for(const size of sizes){
    rows.push(items.slice(idx, idx+size));
    idx += size;
  }
  return rows;
}

function ribbonHTML(ribbonKeys, ribbonMap){
  const rows = distributeBottomHeavy(ribbonKeys, 4);
  const cellW=4.6, cellH=2.9, colGap=0.35, rowGap=0.35;
  const centerX=69.2, rackBottom=54;
  const R = rows.length;
  let html='';
  rows.forEach((row,ri)=>{
    const rowsFromBottom = R-1-ri;
    const top = rackBottom - (rowsFromBottom+1)*(cellH+rowGap);
    const totalW = row.length*cellW + (row.length-1)*colGap;
    const left0 = centerX - totalW/2;
    row.forEach((key,ci)=>{
      const left = left0 + ci*(cellW+colGap);
      const def = ribbonMap[key];
      if(!def) return;
      html += `<div class="ribbon" style="left:${left}%; top:${top}%; width:${cellW}%; height:${cellH}%; background-image:${ribbonBackground(def)};"></div>`;
    });
  });
  return html;
}

function badgeHTML(badgeKeys, badgeMap){
  const cellSize=2.2, gap=0.3, rowBottom=61.5, centerX=68.8;
  const rows = chunk(badgeKeys,5);
  const R = rows.length;
  let html='';
  rows.forEach((row,ri)=>{
    const rowsFromBottom = R-1-ri;
    const top = rowBottom - (rowsFromBottom+1)*(cellSize+gap);
    const totalW = row.length*cellSize + (row.length-1)*gap;
    const left0 = centerX - totalW/2;
    row.forEach((key,ci)=>{
      const def = badgeMap[key];
      if(!def) return;
      const left = left0 + ci*(cellSize+gap);
      const radius = def.shape === 'circle' ? '50%' : '0';
      const clip = def.shape === 'diamond' ? 'clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);' : '';
      html += `<div class="badge" style="left:${left}%; top:${top}%; width:${cellSize}%; height:${cellSize}%; background:${def.color}; border-radius:${radius}; ${clip}"></div>`;
    });
  });
  return html;
}

function insigniaHTML(rankName, rankMap){
  const def = rankMap[rankName];
  if(!def || !def.insignia) return '';
  const w=4.2, h=2.5;
  // Anchor is now the CENTER of the insignia, sitting in the middle of the strap's
  // width (between its two boundary seams) rather than pinned to either edge —
  // matched directly against a reference showing it centered in that band.
  const leftAnchorX=20, leftAnchorY=22;
  const rightAnchorX=80, rightAnchorY=22;
  const left = `
    <div class="insignia" style="left:${leftAnchorX-w/2}%; top:${leftAnchorY-h/2}%; width:${w}%; height:${h}%; background-image:url(${def.insignia}); transform:rotate(-24deg) skewX(-5deg);"></div>`;
  const right = `
    <div class="insignia" style="left:${rightAnchorX-w/2}%; top:${rightAnchorY-h/2}%; width:${w}%; height:${h}%; background-image:url(${def.insignia}); transform:rotate(24deg) skewX(5deg);"></div>`;
  return left + right;
}

function fitNameTape(tapeEl){
  const span = tapeEl.querySelector('span');
  if(!span) return;
  const maxWidth = tapeEl.clientWidth * 0.92;
  let size = tapeEl.clientHeight * 0.6;
  span.style.fontSize = size + 'px';
  let guard = 0;
  while(span.scrollWidth > maxWidth && size > 3 && guard < 120){
    size -= 0.4;
    span.style.fontSize = size + 'px';
    guard++;
  }
}

function jacketHTML(member, ribbonMap, badgeMap, rankMap){
  return `
    ${insigniaHTML(member.rank, rankMap)}
    <div class="name-tape" style="left:24%; top:58.5%; width:16%; height:6.2%;"><span>${member.name.toUpperCase()}</span></div>
    ${ribbonHTML(member.ribbons, ribbonMap)}
    ${badgeHTML(member.badges||[], badgeMap)}
  `;
}

let MEMBERS = [];
let RANKS = [];
let RIBBONS = [];
let BADGES = [];

function ribbonMapOf(){ const m={}; RIBBONS.forEach(r=>m[r.key]=r); return m; }
function badgeMapOf(){ const m={}; BADGES.forEach(b=>m[b.key]=b); return m; }
function rankMapOf(){ const m={}; RANKS.forEach(r=>m[r.name]=r); return m; }
function rankIndex(name){ return RANKS.findIndex(r=>r.name===name); }

function newId(){ return 'm_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

async function addMember(unit){
  const member = { id:newId(), name:"New Member", rank: (RANKS[0] && RANKS[0].name) || "PVT", unit: unit, position:"Member", ribbons:[], badges:[] };
  MEMBERS.push(member);
  await saveJSON('members', MEMBERS);
  renderRoster();
}

async function removeMember(id){
  if(!confirm('Remove this jacket from the roster?')) return;
  MEMBERS = MEMBERS.filter(m=>m.id!==id);
  await saveJSON('members', MEMBERS);
  renderRoster();
}

let searchTerm = '';

function matchesSearch(m){
  const q = searchTerm.trim().toLowerCase();
  if(!q) return true;
  return m.name.toLowerCase().includes(q)
    || m.rank.toLowerCase().includes(q)
    || m.position.toLowerCase().includes(q)
    || m.unit.toLowerCase().includes(q);
}

function sortBySeniority(list){
  return [...list].sort((a,b)=>{
    const ap = POSITION_SENIORITY.indexOf(a.position); const bp = POSITION_SENIORITY.indexOf(b.position);
    const aPos = ap === -1 ? POSITION_SENIORITY.length : ap;
    const bPos = bp === -1 ? POSITION_SENIORITY.length : bp;
    if(aPos !== bPos) return aPos - bPos;
    const ar = rankIndex(a.rank); const br = rankIndex(b.rank);
    const aRank = ar === -1 ? RANKS.length : ar;
    const bRank = br === -1 ? RANKS.length : br;
    if(aRank !== bRank) return aRank - bRank;
    return a.name.localeCompare(b.name);
  });
}

let collapsedUnits = new Set();

function renderRoster(){
  const main = document.getElementById('main');
  main.innerHTML = '';
  const ribbonMap = ribbonMapOf();
  const badgeMap = badgeMapOf();
  const rankMap = rankMapOf();
  UNIT_OPTIONS.forEach(unit=>{
    const allInUnit = MEMBERS.filter(m=>m.unit===unit);
    const members = sortBySeniority(allInUnit.filter(matchesSearch));
    const isCollapsed = collapsedUnits.has(unit);
    const section = document.createElement('section');
    section.className = 'company';
    section.innerHTML = `
      <div class="company-head">
        <h2>${unit}</h2>
        <div class="head-actions">
          <button class="collapse-btn" title="${isCollapsed ? 'Expand' : 'Collapse'}">${isCollapsed ? '▸ Expand' : '▾ Collapse'}</button>
          <button class="new-btn" data-unit="${unit}">+ New</button>
        </div>
      </div>
      <div class="member-grid" style="${isCollapsed ? 'display:none;' : ''}"></div>
    `;
    section.querySelector('.new-btn').addEventListener('click', ()=>addMember(unit));
    section.querySelector('.collapse-btn').addEventListener('click', ()=>{
      if(collapsedUnits.has(unit)) collapsedUnits.delete(unit);
      else collapsedUnits.add(unit);
      renderRoster();
    });
    const grid = section.querySelector('.member-grid');
    if(members.length === 0){
      grid.innerHTML = allInUnit.length === 0
        ? `<div class="empty-note">No members yet in ${unit}.</div>`
        : `<div class="empty-note">No matches in ${unit}.</div>`;
    }
    members.forEach(m=>{
      const card = document.createElement('div');
      card.className = 'member-card';
      card.innerHTML = `
        <button class="remove-btn" title="Remove">&times;</button>
        <button class="zoom-btn" title="Zoom">&#128269;</button>
        <div class="jacket-mini">${jacketHTML(m, ribbonMap, badgeMap, rankMap)}</div>
        <div class="mcaption">
          <div class="mname">${m.rank}.${m.name}</div>
          <div class="mrank">${m.position} - ${m.unit}</div>
        </div>
      `;
      card.querySelector('.remove-btn').addEventListener('click', (e)=>{
        e.stopPropagation();
        removeMember(m.id);
      });
      card.querySelector('.zoom-btn').addEventListener('click', (e)=>{
        e.stopPropagation();
        openZoom(m, ribbonMap, badgeMap, rankMap);
      });
      card.addEventListener('click', ()=>{
        window.location.href = 'admin.html?member=' + encodeURIComponent(m.id);
      });
      grid.appendChild(card);
    });
    main.appendChild(section);
  });
  document.querySelectorAll('.name-tape').forEach(fitNameTape);
}

function openZoom(member, ribbonMap, badgeMap, rankMap){
  const overlay = document.getElementById('zoomOverlay');
  const stage = document.getElementById('zoomStage');
  stage.innerHTML = jacketHTML(member, ribbonMap, badgeMap, rankMap);
  document.getElementById('zoomName').textContent = member.rank + '.' + member.name;
  document.getElementById('zoomRank').textContent = member.position + ' - ' + member.unit;
  overlay.classList.add('open');
  const tape = stage.querySelector('.name-tape');
  if(tape) fitNameTape(tape);
}

function closeZoom(){
  document.getElementById('zoomOverlay').classList.remove('open');
}
document.getElementById('zoomClose').addEventListener('click', closeZoom);
document.getElementById('zoomOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'zoomOverlay') closeZoom();
});
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape') closeZoom();
});

document.getElementById('searchInput').addEventListener('input', (e)=>{
  searchTerm = e.target.value;
  renderRoster();
});

window.addEventListener('resize', () => {
  document.querySelectorAll('.name-tape').forEach(fitNameTape);
});

function normalizeRanks(ranks){
  return ranks.map(r => typeof r === 'string' ? { name:r, insignia:null } : r);
}

async function init(){
  MEMBERS = await loadJSON('members', DEFAULT_MEMBERS);
  const rawRanks = await loadJSON('ranks', DEFAULT_RANKS);
  const ranksNeedMigration = rawRanks.some(r => typeof r === 'string');
  RANKS = normalizeRanks(rawRanks);
  if(ranksNeedMigration) await saveJSON('ranks', RANKS);
  RIBBONS = await loadJSON('ribbons', DEFAULT_RIBBONS);
  BADGES = await loadJSON('badges', DEFAULT_BADGES);
  renderRoster();
}
init();
</script>

</body>
</html>
