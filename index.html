<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UNKSO — Jacket</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap');
:root{
  --bg-page:#14161c; --bg-panel:#1b1e26; --bg-card:#20232c;
  --border:#2c303a; --orange:#e35f2e; --orange-dim:#b8481f;
  --text-primary:#f2f1ee; --text-secondary:#9aa0ab; --text-muted:#6b7280;
  --olive:#585844; --olive-dark:#454633; --tan:#c9bfa0; --tan-dark:#8a7f60;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg-page); color:var(--text-primary); font-family:'Inter',sans-serif;}

.topbar{display:flex; align-items:center; justify-content:space-between; padding:14px 32px; background:var(--bg-panel); border-bottom:1px solid var(--border);}
.brand{display:flex; align-items:center; gap:10px;}
.brand svg{width:32px; height:32px;}
.brand-text{font-family:'Poppins'; font-weight:700; font-size:21px; color:var(--orange);}
.top-actions{display:flex; align-items:center; gap:20px; color:var(--text-secondary); font-size:13.5px;}
.user-chip{display:flex; align-items:center; gap:8px; font-weight:500; color:var(--text-primary);}
.user-chip .av{width:24px; height:24px; border-radius:5px; background:var(--orange-dim);}

.subnav{display:flex; gap:30px; padding:0 32px; background:var(--bg-page); border-bottom:1px solid var(--border);}
.subnav a{color:var(--text-secondary); text-decoration:none; font-size:14px; font-weight:500; padding:13px 2px; border-bottom:2px solid transparent;}
.subnav a.active{color:var(--orange); border-color:var(--orange);}

main{max-width:900px; margin:0 auto; padding:32px;}

.switcher{display:flex; gap:10px; align-items:center; margin-bottom:24px;}
.switcher label{font-size:12.5px; color:var(--text-muted); letter-spacing:.04em; text-transform:uppercase;}
.switcher select{background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary); padding:8px 12px; border-radius:8px; font-size:13.5px; font-family:'Inter';}

.jacket-panel{background:var(--bg-panel); border:1px solid var(--border); border-radius:14px; padding:32px; display:flex; flex-direction:column; align-items:center;}

.jacket-stage{position:relative; width:720px; height:480px; max-width:100%;}
.part{position:absolute;}

.name-tape span{
  display:flex; align-items:center; justify-content:center; height:100%;
  font-family:'JetBrains Mono'; font-weight:600; font-size:13px; letter-spacing:.04em;
  color:#2b2717;
}
.ribbon{border-radius:1.5px; border:1px solid rgba(0,0,0,.35);}
.shoulder-board{display:flex; align-items:center; justify-content:center; border-radius:3px; border:1px solid rgba(0,0,0,.3);}
.shoulder-board span{font-family:'Poppins'; font-weight:700; font-size:11px; color:#c9a84c; letter-spacing:.05em;}

.caption{margin-top:22px; text-align:center;}
.caption .name{font-family:'Poppins'; font-weight:600; font-size:20px;}
.caption .rank{color:var(--text-secondary); font-size:13.5px; margin-top:2px;}
.caption .unit{color:var(--text-muted); font-size:12px; margin-top:2px; letter-spacing:.03em;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <svg viewBox="0 0 48 48"><path d="M24 3l18 6v13c0 12-8 19-18 23C14 41 6 34 6 22V9z" fill="none" stroke="#e35f2e" stroke-width="2.5"/><text x="24" y="27" font-family="Poppins" font-weight="700" font-size="13" fill="#e35f2e" text-anchor="middle">US</text></svg>
    <span class="brand-text">UNKSO</span>
  </div>
  <div class="top-actions">
    <span>+ Create</span><span>&#128276;</span><span>&#9993;</span>
    <span class="user-chip"><span class="av"></span>2LT.Civoen=US=</span>
  </div>
</div>

<div class="subnav">
  <a href="#" class="active">Jacket</a>
  <a href="#">PERSCOM</a>
  <a href="admin.html">Admin</a>
</div>

<main>
  <div class="switcher">
    <label>Viewing jacket for</label>
    <select id="memberSelect"></select>
  </div>

  <div class="jacket-panel">
    <div class="jacket-stage" id="stage"></div>
    <div class="caption">
      <div class="name" id="capName"></div>
      <div class="rank" id="capRank"></div>
      <div class="unit" id="capUnit"></div>
    </div>
  </div>
</main>

<script>
const RIBBONS = {
  combat_readiness:  "repeating-linear-gradient(90deg,#8a3630 0 8px,#1c1e15 8px 10px,#8a3630 10px 18px)",
  national_defense:  "linear-gradient(90deg,#3a4a7a 0 30%,#e8e1cc 30% 40%,#8a3630 40% 60%,#e8e1cc 60% 70%,#3a4a7a 70% 100%)",
  marksmanship:      "repeating-linear-gradient(45deg,#4f6b34 0 6px,#c9a84c 6px 9px)",
  meritorious:       "linear-gradient(90deg,#5a3a6b 0 50%,#c9a84c 50% 100%)",
  good_conduct:      "repeating-linear-gradient(90deg,#c9a84c 0 5px,#3a4a2c 5px 10px)",
  bct_completion:    "#8f7a3a",
  valor_purple:      "#5b2a86",
  overseas_service:  "#6fa8d6",
  campaign_service:  "repeating-linear-gradient(90deg,#e35f2e 0 6px,#1c1e15 6px 8px)",
  longevity:         "repeating-linear-gradient(90deg,#2f5233 0 10px,#c9a84c 10px 12px)",
  achievement:       "#1b2a4a",
  unit_citation:     "repeating-linear-gradient(90deg,#7a1f1f 0 4px,#f2f1ee 4px 8px)"
};

const DEFAULT_MEMBERS = [
  { id:"dentalmav", name:"LTC.DentalMav", rank:"LTC", unit:"Battalion Command", ribbons:["national_defense","valor_purple","combat_readiness","meritorious","marksmanship","achievement","overseas_service","campaign_service","unit_citation","good_conduct","longevity","bct_completion"] },
  { id:"vincentvanghost", name:"VincentVanGhost", rank:"SPC", unit:"2nd Platoon, Charlie Co.", ribbons:["combat_readiness","national_defense","marksmanship"] },
  { id:"semperfi1371", name:"SemperFi1371", rank:"SPC", unit:"1st Platoon, Charlie Co.", ribbons:["combat_readiness","meritorious"] },
  { id:"civoen", name:"2LT.Civoen", rank:"2LT", unit:"1st Platoon, Charlie Co.", ribbons:["national_defense","marksmanship","good_conduct","achievement","bct_completion"] }
];

let MEMBERS = [];

async function loadMembers(){
  try{
    if(window.storage){
      const result = await window.storage.get('unkso-members', true);
      if(result && result.value){
        return JSON.parse(result.value);
      }
    }
  }catch(err){
    console.log('No saved roster yet, using defaults', err);
  }
  try{
    if(window.storage){
      await window.storage.set('unkso-members', JSON.stringify(DEFAULT_MEMBERS), true);
    }
  }catch(err){
    console.log('Could not seed storage', err);
  }
  return DEFAULT_MEMBERS;
}

function ribbonRows(keys){
  const rows = [];
  for (let i=0;i<keys.length;i+=4) rows.push(keys.slice(i,i+4));
  return rows;
}

function renderJacket(stage, member){
  const rows = ribbonRows(member.ribbons);
  let rackHTML = "";
  rows.forEach((row,ri)=>{
    row.forEach((key,ci)=>{
      const x = 388 + ci*40;
      const y = 300 - (rows.length-1-ri)*15;
      rackHTML += `<div class="part ribbon" style="left:${x}px; top:${y}px; width:38px; height:13px; background:${RIBBONS[key]};"></div>`;
    });
  });

  stage.innerHTML = `
    <div class="part" style="left:130px; top:110px; width:460px; height:370px; background:var(--olive); clip-path:polygon(0% 8%, 26% 0%, 74% 0%, 100% 8%, 113% 100%, -13% 100%);"></div>

    <div class="part shoulder-board" style="left:150px; top:100px; width:70px; height:24px; background:var(--olive-dark); transform:rotate(-8deg);"><span>${member.rank}</span></div>
    <div class="part shoulder-board" style="left:500px; top:100px; width:70px; height:24px; background:var(--olive-dark); transform:rotate(8deg);"><span>${member.rank}</span></div>

    <div class="part" style="left:290px; top:45px; width:180px; height:255px; background:var(--tan); clip-path:polygon(0% 0%, 100% 0%, 50% 100%);"></div>
    <div class="part" style="left:348px; top:60px; width:24px; height:240px; background:var(--olive-dark); clip-path:polygon(0% 0%, 100% 0%, 50% 100%);"></div>

    <div class="part" style="left:290px; top:48px; width:16px; height:16px; border-radius:50%; background:#c9a84c; border:1px solid #8f7a3a;"></div>
    <div class="part" style="left:454px; top:48px; width:16px; height:16px; border-radius:50%; background:#c9a84c; border:1px solid #8f7a3a;"></div>

    <div class="part" style="left:352px; top:170px; width:16px; height:16px; border-radius:50%; background:var(--tan); border:1px solid var(--tan-dark);"></div>
    <div class="part" style="left:352px; top:270px; width:16px; height:16px; border-radius:50%; background:var(--tan); border:1px solid var(--tan-dark);"></div>
    <div class="part" style="left:352px; top:370px; width:16px; height:16px; border-radius:50%; background:var(--tan); border:1px solid var(--tan-dark);"></div>

    <div class="part" style="left:170px; top:310px; width:170px; height:24px; border-radius:4px 4px 0 0; background:var(--olive-dark);"></div>
    <div class="part" style="left:170px; top:330px; width:170px; height:150px; border-radius:6px; background:var(--olive-dark);"></div>
    <div class="part" style="left:247px; top:325px; width:14px; height:14px; border-radius:50%; background:var(--tan); border:1px solid var(--tan-dark);"></div>

    <div class="part" style="left:380px; top:310px; width:170px; height:24px; border-radius:4px 4px 0 0; background:var(--olive-dark);"></div>
    <div class="part" style="left:380px; top:330px; width:170px; height:150px; border-radius:6px; background:var(--olive-dark);"></div>
    <div class="part" style="left:457px; top:325px; width:14px; height:14px; border-radius:50%; background:var(--tan); border:1px solid var(--tan-dark);"></div>

    <div class="part name-tape" style="left:185px; top:344px; width:140px; height:28px; background:var(--tan); border-radius:3px;"><span>${member.name.toUpperCase()}</span></div>

    ${rackHTML}
  `;
}

const select = document.getElementById('memberSelect');

function showMember(id){
  const m = MEMBERS.find(x=>x.id===id) || MEMBERS[0];
  renderJacket(document.getElementById('stage'), m);
  document.getElementById('capName').textContent = m.name;
  document.getElementById('capRank').textContent = m.rank + " — " + m.ribbons.length + " decorations";
  document.getElementById('capUnit').textContent = m.unit;
}

async function init(){
  document.getElementById('capName').textContent = 'Loading roster…';
  MEMBERS = await loadMembers();
  select.innerHTML = '';
  MEMBERS.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id; opt.textContent = m.name;
    select.appendChild(opt);
  });
  select.addEventListener('change', e => showMember(e.target.value));
  showMember(MEMBERS[0].id);
}

init();
</script>

</body>
</html>
