<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UNKSO — Ribbons</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap');
:root{
  --bg-page:#14161c; --bg-panel:#1b1e26; --bg-card:#20232c;
  --border:#2c303a; --orange:#e35f2e; --orange-dim:#b8481f;
  --text-primary:#f2f1ee; --text-secondary:#9aa0ab; --text-muted:#6b7280;
  --red:#c0392b;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg-page); color:var(--text-primary); font-family:'Inter',sans-serif;}

.subnav{display:flex; align-items:center; gap:30px; padding:16px 32px; background:var(--bg-panel); border-bottom:1px solid var(--border);}
.subnav a{color:var(--text-secondary); text-decoration:none; font-size:14px; font-weight:500; padding-bottom:4px; border-bottom:2px solid transparent;}
.subnav a.active{color:var(--orange); border-color:var(--orange);}
.subnav a.nav-cta{
  margin-left:auto; color:#1c1108; background:var(--orange); padding:7px 18px; border-radius:7px;
  font-weight:700; border-bottom:none; box-shadow:0 1px 0 rgba(0,0,0,.2);
}
.subnav a.nav-cta:hover{background:#f06c37;}
.subnav a.nav-cta.active{background:#f06c37; box-shadow:0 0 0 2px rgba(227,95,46,.4);}

main{max-width:820px; margin:0 auto; padding:32px;}
h1{font-family:'Poppins'; font-weight:600; font-size:22px; margin:0 0 4px;}
.sub{color:var(--text-muted); font-size:12.5px; margin-bottom:22px; letter-spacing:.03em;}

.panel{background:var(--bg-panel); border:1px solid var(--border); border-radius:14px; padding:20px;}

.search-row{margin-bottom:16px;}
.search-row input{
  width:100%; background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary);
  padding:10px 14px; border-radius:8px; font-size:14px; font-family:'Inter';
}

.ribbon-row{display:grid; grid-template-columns:22px 56px 1fr 110px 40px 40px 36px; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid var(--border); background:var(--bg-panel);}
.ribbon-row:last-child{border-bottom:none;}
.ribbon-row.dragging{opacity:.4;}
.drag-handle{color:var(--text-muted); font-size:15px; text-align:center; cursor:grab; user-select:none;}
.swatch{width:100%; height:18px; border-radius:2px; border:1px solid rgba(0,0,0,.35);}
.ribbon-row input[type=text]{
  background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary);
  padding:8px 10px; border-radius:6px; font-size:13.5px; font-family:'Inter';
}
.ribbon-row select{
  background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary);
  padding:8px 6px; border-radius:6px; font-size:12.5px; font-family:'Inter';
}
.ribbon-row input[type=color]{
  width:40px; height:34px; padding:2px; background:var(--bg-card); border:1px solid var(--border); border-radius:6px; cursor:pointer;
}
.icon-btn{
  width:36px; height:34px; background:var(--bg-card); border:1px solid var(--border); color:var(--text-secondary);
  border-radius:6px; font-size:16px; cursor:pointer; font-family:'Inter';
}
.icon-btn:hover{border-color:var(--red); color:var(--red);}

.col-labels{display:grid; grid-template-columns:22px 56px 1fr 110px 40px 40px 36px; gap:10px; padding:0 4px 8px; font-size:11px; color:var(--text-muted); letter-spacing:.05em; text-transform:uppercase;}

.add-panel{margin-top:20px; padding-top:18px; border-top:1px solid var(--border);}
.add-panel h3{font-family:'Poppins'; font-size:14px; font-weight:600; margin:0 0 12px; color:var(--orange);}
.add-grid{display:grid; grid-template-columns:1fr 110px 40px 40px auto; align-items:center; gap:10px;}
.add-grid input[type=text]{
  background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary);
  padding:9px 12px; border-radius:6px; font-size:13.5px; font-family:'Inter';
}
.add-grid select{
  background:var(--bg-card); border:1px solid var(--border); color:var(--text-primary);
  padding:9px 6px; border-radius:6px; font-size:12.5px;
}
.add-grid input[type=color]{
  width:40px; height:36px; padding:2px; background:var(--bg-card); border:1px solid var(--border); border-radius:6px; cursor:pointer;
}
.add-btn{
  background:var(--orange); color:#1c1108; border:none; border-radius:6px; padding:0 16px; height:36px;
  font-family:'Poppins'; font-weight:600; font-size:13px; cursor:pointer;
}
.add-btn:hover{background:#f06c37;}

.note{color:var(--text-muted); font-size:12px; margin-top:14px; line-height:1.5;}
</style>
</head>
<body>

<div class="subnav">
  <a href="index.html">Jackets</a>
  <a href="ranks.html">Ranks</a>
  <a href="ribbons.html" class="active">Ribbons</a>
  <a href="admin.html" class="nav-cta">Admin</a>
</div>

<main>
  <h1>Ribbons</h1>
  <div class="sub">CONTROLS THE RIBBON CHECKLIST ON THE ADMIN PAGE</div>

  <div class="panel">
    <div class="search-row"><input id="searchInput" type="text" placeholder="Search ribbons…"></div>
    <div class="col-labels"><span></span><span>Preview</span><span>Name</span><span>Pattern</span><span>Color 1</span><span>Color 2</span><span></span></div>
    <div id="ribbonList"></div>

    <div class="add-panel">
      <h3>Add a new ribbon</h3>
      <div class="add-grid">
        <input id="newLabel" type="text" placeholder="Ribbon name">
        <select id="newPattern">
          <option value="solid">Solid</option>
          <option value="stripes">Stripes</option>
          <option value="diagonal">Diagonal</option>
          <option value="split">Split</option>
          <option value="triband">Triband</option>
        </select>
        <input id="newColor1" type="color" value="#8a3630">
        <input id="newColor2" type="color" value="#1c1e15">
        <button class="add-btn" id="addBtn">Add ribbon</button>
      </div>
    </div>
  </div>
  <div class="note">Removing a ribbon here also removes it from any jacket it's currently assigned to.</div>
</main>

<script>
const DEFAULT_RIBBONS = [
  { key:"combat_readiness",  label:"Combat Readiness Medal",     pattern:"stripes",  color1:"#8a3630", color2:"#1c1e15" },
  { key:"national_defense",  label:"National Defense Service",   pattern:"triband",  color1:"#3a4a7a", color2:"#e8e1cc" },
  { key:"marksmanship",      label:"Marksmanship Ribbon",        pattern:"diagonal", color1:"#4f6b34", color2:"#c9a84c" },
  { key:"meritorious",       label:"Meritorious Service Medal",  pattern:"split",    color1:"#5a3a6b", color2:"#c9a84c" },
  { key:"good_conduct",      label:"Good Conduct Ribbon",        pattern:"stripes",  color1:"#c9a84c", color2:"#3a4a2c" },
  { key:"bct_completion",    label:"BCT Completion Ribbon",      pattern:"solid",    color1:"#8f7a3a", color2:"#8f7a3a" },
  { key:"valor_purple",      label:"Valor Commendation",         pattern:"solid",    color1:"#5b2a86", color2:"#5b2a86" },
  { key:"overseas_service",  label:"Overseas Service Ribbon",    pattern:"solid",    color1:"#6fa8d6", color2:"#6fa8d6" },
  { key:"campaign_service",  label:"Campaign Service Medal",     pattern:"stripes",  color1:"#e35f2e", color2:"#1c1e15" },
  { key:"longevity",         label:"Longevity Service Ribbon",   pattern:"stripes",  color1:"#2f5233", color2:"#c9a84c" },
  { key:"achievement",       label:"Achievement Medal",          pattern:"solid",    color1:"#1b2a4a", color2:"#1b2a4a" },
  { key:"unit_citation",     label:"Unit Citation Ribbon",       pattern:"stripes",  color1:"#7a1f1f", color2:"#f2f1ee" }
];

// Set this to your deployed Worker URL (no trailing slash), e.g. 'https://unkso-api.yoursubdomain.workers.dev'
const API_BASE = 'https://unkso-api.adambramfitt.workers.dev';

async function loadJSON(key, defaults){
  try{
    const res = await fetch(`${API_BASE}/api/${key}`);
    if(res.ok){
      const data = await res.json();
      if(data !== null) return data;
    }
  }catch(err){ console.log('Could not load '+key+' from API, using defaults', err); }
  try{
    await fetch(`${API_BASE}/api/${key}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(defaults)
    });
  }catch(err){ console.log('Could not seed '+key, err); }
  return defaults;
}

async function saveJSON(key, value){
  try{
    const res = await fetch(`${API_BASE}/api/${key}`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(value)
    });
    return res.ok;
  }catch(err){ console.log('Save failed for '+key, err); return false; }
}

function ribbonCSS(r){
  switch(r.pattern){
    case 'solid': return r.color1;
    case 'stripes': return `repeating-linear-gradient(90deg, ${r.color1} 0 8px, ${r.color2} 8px 10px)`;
    case 'diagonal': return `repeating-linear-gradient(45deg, ${r.color1} 0 6px, ${r.color2} 6px 9px)`;
    case 'split': return `linear-gradient(90deg, ${r.color1} 0 50%, ${r.color2} 50% 100%)`;
    case 'triband': return `linear-gradient(90deg, ${r.color1} 0 30%, ${r.color2} 30% 70%, ${r.color1} 70% 100%)`;
    default: return r.color1;
  }
}

function newKey(label){
  return 'r_' + label.toLowerCase().replace(/[^a-z0-9]+/g,'_').slice(0,24) + '_' + Math.random().toString(36).slice(2,5);
}

let RIBBONS = [];
let MEMBERS = [];
let searchTerm = '';
let dragSrcIdx = null;

async function pruneFromMembers(key){
  MEMBERS = MEMBERS.map(m => ({...m, ribbons: m.ribbons.filter(k=>k!==key)}));
  await saveJSON('members', MEMBERS);
}

function renderRibbons(){
  const list = document.getElementById('ribbonList');
  list.innerHTML = '';
  const q = searchTerm.trim().toLowerCase();
  const visibleIdx = RIBBONS.map((_,i)=>i).filter(i => !q || RIBBONS[i].label.toLowerCase().includes(q));

  if(visibleIdx.length === 0){
    list.innerHTML = '<div class="note" style="margin-top:6px;">No ribbons match your search.</div>';
    return;
  }

  visibleIdx.forEach(idx=>{
    const r = RIBBONS[idx];
    const row = document.createElement('div');
    row.className = 'ribbon-row';
    row.draggable = true;
    row.dataset.idx = idx;
    row.innerHTML = `
      <span class="drag-handle" title="Drag to reorder">&#8942;&#8942;</span>
      <div class="swatch" style="background:${ribbonCSS(r)}"></div>
      <input type="text" value="${r.label}" data-field="label">
      <select data-field="pattern">
        <option value="solid">Solid</option>
        <option value="stripes">Stripes</option>
        <option value="diagonal">Diagonal</option>
        <option value="split">Split</option>
        <option value="triband">Triband</option>
      </select>
      <input type="color" value="${r.color1}" data-field="color1">
      <input type="color" value="${r.color2}" data-field="color2">
      <button class="icon-btn" title="Remove">&times;</button>
    `;
    row.querySelector('select').value = r.pattern;
    const update = async (field, value)=>{
      RIBBONS[idx][field] = value;
      await saveJSON('ribbons', RIBBONS);
      row.querySelector('.swatch').style.background = ribbonCSS(RIBBONS[idx]);
    };
    row.querySelector('[data-field="label"]').addEventListener('change', e=>update('label', e.target.value));
    row.querySelector('[data-field="pattern"]').addEventListener('change', e=>update('pattern', e.target.value));
    row.querySelector('[data-field="color1"]').addEventListener('input', e=>update('color1', e.target.value));
    row.querySelector('[data-field="color2"]').addEventListener('input', e=>update('color2', e.target.value));
    row.querySelector('.icon-btn').addEventListener('click', async ()=>{
      if(!confirm(`Remove "${r.label}"? This will unassign it from any jackets that have it.`)) return;
      await pruneFromMembers(r.key);
      RIBBONS.splice(idx,1);
      await saveJSON('ribbons', RIBBONS);
      renderRibbons();
    });
    row.addEventListener('dragstart', ()=>{
      dragSrcIdx = idx;
      row.classList.add('dragging');
    });
    row.addEventListener('dragend', ()=> row.classList.remove('dragging'));
    row.addEventListener('dragover', (e)=> e.preventDefault());
    row.addEventListener('drop', async (e)=>{
      e.preventDefault();
      if(dragSrcIdx === null || dragSrcIdx === idx) return;
      const targetKey = RIBBONS[idx].key;
      const [moved] = RIBBONS.splice(dragSrcIdx, 1);
      const newTargetIdx = RIBBONS.findIndex(r=>r.key===targetKey);
      RIBBONS.splice(newTargetIdx, 0, moved);
      dragSrcIdx = null;
      await saveJSON('ribbons', RIBBONS);
      renderRibbons();
    });
    list.appendChild(row);
  });
}

document.getElementById('searchInput').addEventListener('input', (e)=>{
  searchTerm = e.target.value;
  renderRibbons();
});

document.getElementById('addBtn').addEventListener('click', async ()=>{
  const label = document.getElementById('newLabel').value.trim();
  if(!label) return;
  const ribbon = {
    key: newKey(label),
    label,
    pattern: document.getElementById('newPattern').value,
    color1: document.getElementById('newColor1').value,
    color2: document.getElementById('newColor2').value
  };
  RIBBONS.push(ribbon);
  document.getElementById('newLabel').value = '';
  await saveJSON('ribbons', RIBBONS);
  renderRibbons();
});

async function init(){
  RIBBONS = await loadJSON('ribbons', DEFAULT_RIBBONS);
  MEMBERS = await loadJSON('members', []);
  renderRibbons();
}
init();
</script>

</body>
</html>
